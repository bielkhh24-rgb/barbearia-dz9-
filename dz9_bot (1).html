<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia Dz9 — Bot de Agendamento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --purple-dark:  #0a0315;
      --purple-bg:    #1a0a2e;
      --purple-mid:   #2d0a4e;
      --purple-top:   #3d0d6e;
      --purple-main:  #7c3aed;
      --purple-light: #a855f7;
      --purple-pale:  #c084fc;
      --purple-text:  #e2c9ff;
      --purple-muted: #9b66cc;
      --purple-dim:   #7c5490;
      --purple-bar:   #12061f;
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--purple-dark);
      font-family: var(--font);
    }

    .wa-panel {
      width: calc(100vw - 32px);
      height: calc(100vh - 32px);
      margin: 16px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 0.5px solid var(--purple-top);
      box-shadow: 0 8px 40px rgba(124,58,237,.25);
    }

    @media (max-width: 600px) {
      .wa-panel {
        width: calc(100vw - 16px);
        height: calc(100vh - 16px);
        margin: 8px;
        border-radius: 12px;
      }
    }

    /* ── Header ── */
    .wa-header {
      background: linear-gradient(135deg, #1a0a2e 0%, #2d0a4e 60%, #3d0d6e 100%);
      padding: 13px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .wa-logo-wrap {
      width: 40px; height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      border: 2px solid #9b34c8;
      flex-shrink: 0;
    }
    .wa-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .wa-name   { font-size: 14px; font-weight: 500; color: #fff; }
    .wa-status { font-size: 11px; color: var(--purple-pale); }
    .wa-dot    {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--purple-light);
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--purple-light);
    }

    /* ── Messages ── */
    .wa-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: var(--purple-bg);
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* mínimo 200px, máximo livre dentro do painel */
      min-height: 200px;
    }
    .msg {
      max-width: 82%;
      border-radius: var(--radius-md);
      padding: 8px 11px;
      font-size: 13px;
      line-height: 1.55;
    }
    .msg-bot  { background: var(--purple-mid); border-radius: 0 10px 10px 10px; color: var(--purple-text); }
    .msg-user { background: #4a1080; border-radius: 10px 10px 0 10px; align-self: flex-end; color: #f0d6ff; }
    .msg-time { font-size: 10px; color: var(--purple-muted); text-align: right; margin-top: 3px; }
    .msg strong { color: var(--purple-pale); }
    .msg em    { color: var(--purple-light); font-style: normal; }

    /* ── Options bar ── */
    .wa-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px;
      background: var(--purple-bar);
      border-top: 0.5px solid var(--purple-top);
      flex-shrink: 0;
    }
    .wa-btn {
      border: 1px solid var(--purple-main);
      color: var(--purple-pale);
      background: transparent;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font);
    }
    .wa-btn:hover { background: var(--purple-main); color: #fff; }

    /* ── Input row ── */
    .wa-input-row {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: var(--purple-bar);
      border-top: 0.5px solid var(--purple-top);
    }
    .wa-input {
      flex: 1;
      border: 0.5px solid var(--purple-main);
      border-radius: 20px;
      padding: 7px 13px;
      font-size: 13px;
      background: var(--purple-mid);
      color: var(--purple-text);
      font-family: var(--font);
      outline: none;
    }
    .wa-input::placeholder { color: var(--purple-dim); }
    .wa-send {
      background: var(--purple-main);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer;
      font-size: 15px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Typing dots ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .typing-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--purple-muted);
      animation: bounce 1s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ── Scrollbar ── */
    .wa-messages::-webkit-scrollbar { width: 4px; }
    .wa-messages::-webkit-scrollbar-track { background: transparent; }
    .wa-messages::-webkit-scrollbar-thumb { background: var(--purple-top); border-radius: 2px; }
  </style>
</head>

    <div class="wa-messages" id="messages">
      <div class="msg msg-bot">
        E aí! Bem-vindo à <strong>Barbearia Dz9</strong> ✂️<br>
        Vamos agendar o seu horário? Me diz qual <strong>serviço</strong> você quer:
        <div class="msg-time">agora</div>
      </div>

    <div class="wa-options" id="options">
      <button class="wa-btn" onclick="selectService('✂️ Corte')">✂️ Corte</button>
      <button class="wa-btn" onclick="selectService('🪒 Barba')">🪒 Barba</button>
      <button class="wa-btn" onclick="selectService('💈 Corte + Barba')">💈 Corte + Barba</button>
      <button class="wa-btn" onclick="selectService('💧 Hidratação')">💧 Hidratação</button>
      <button class="wa-btn" onclick="selectService('🎨 Pigmentação')">🎨 Pigmentação</button>
    </div>

<script>
const state = { step:'service', service:null, date:null, time:null, name:null };

/* ── Helpers ── */
function addMessage(html, isUser=false){
  return new Promise(r => setTimeout(() => {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = `msg ${isUser?'msg-user':'msg-bot'}`;
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    d.innerHTML = html + `<div class="msg-time">${t}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    r();
  }, 0));
}

function showTyping(ms=900){
  return new Promise(r => {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg msg-bot';
    d.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { d.remove(); r(); }, ms);
  });
}

function setOptions(html){ document.getElementById('options').innerHTML = html; }
function clearOptions(){ document.getElementById('options').innerHTML = ''; }

/* ── Verifica conflito de horário ── */
function isTimeBooked(date, time){
  const saved = JSON.parse(localStorage.getItem('dz9_appointments') || '[]');
  return saved.some(a => a.date === date && a.time === time);
}

/* ── Retorna horários com status de disponibilidade ── */
function getAvailableTimes(date){
  const allTimes = ['08:00','09:00','09:30','10:00','10:30','11:00','11:30','14:00','14:30','15:00','15:30','16:00'];
  return allTimes.map(t => ({ time: t, booked: isTimeBooked(date, t) }));
}

/* ── Fluxo ── */
async function selectService(svc){
  state.service = svc; state.step = 'date';
  clearOptions();
  await addMessage(svc, true);
  await showTyping(700);
  await addMessage(`Fechou! 💈 Agora escolhe a <strong>data</strong>:`);
  const dates = getUpcomingDates();
  setOptions(dates.map(d=>`<button class="wa-btn" onclick="selectDate('${d.label}')">${d.label}</button>`).join(''));
}

function getUpcomingDates(){
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const today=new Date();
  return Array.from({length:5},(_,i)=>{
    const d=new Date(today); d.setDate(today.getDate()+i);
    const label = i===0?'Hoje':i===1?'Amanhã':`${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
    return {label};
  });
}

async function selectDate(label){
  state.date = label; state.step = 'time';
  clearOptions();
  await addMessage(label, true);
  await showTyping(600);

  const slots = getAvailableTimes(label);
  const allBooked = slots.every(s => s.booked);

  if(allBooked){
    await addMessage(`😔 Puxa, não tem mais horários disponíveis para <strong>${label}</strong>. Escolhe outro dia:`);
    const dates = getUpcomingDates();
    state.step = 'date';
    setOptions(dates.map(d=>`<button class="wa-btn" onclick="selectDate('${d.label}')">${d.label}</button>`).join(''));
    return;
  }

  await addMessage(`Boa! Agora escolhe o <strong>horário</strong>:<br><small style="color:var(--purple-muted)">⛔ Horários marcados em cinza já estão ocupados</small>`);

  setOptions(slots.map(s => {
    if(s.booked){
      return `<button class="wa-btn" disabled style="opacity:.38;cursor:not-allowed;text-decoration:line-through;" title="Já ocupado">${s.time} ⛔</button>`;
    }
    return `<button class="wa-btn" onclick="selectTime('${s.time}')">${s.time}</button>`;
  }).join(''));
}

async function selectTime(time){
  /* Dupla verificação em tempo real (outro cliente pode ter agendado enquanto o usuário escolhia) */
  if(isTimeBooked(state.date, time)){
    await addMessage(`⚠️ Ops! O horário <strong>${time}</strong> acabou de ser reservado. Escolhe outro:`);
    const slots = getAvailableTimes(state.date);
    setOptions(slots.map(s => {
      if(s.booked){
        return `<button class="wa-btn" disabled style="opacity:.38;cursor:not-allowed;text-decoration:line-through;">${s.time} ⛔</button>`;
      }
      return `<button class="wa-btn" onclick="selectTime('${s.time}')">${s.time}</button>`;
    }).join(''));
    return;
  }

  state.time = time; state.step = 'name';
  clearOptions();
  await addMessage(time, true);
  await showTyping(600);
  await addMessage(`Perfeito! ⏰ Me diz o seu <strong>nome completo</strong>:`);
  setOptions(`<div class="wa-input-row" style="width:100%;padding:0;"><input class="wa-input" id="user-input" placeholder="Seu nome..." onkeydown="if(event.key==='Enter')submitName()" maxlength="60" /><button class="wa-send" onclick="submitName()">➤</button></div>`);
  setTimeout(()=>document.getElementById('user-input')?.focus(), 100);
}

async function submitName(){
  const v = document.getElementById('user-input')?.value?.trim();
  if(!v || v.length < 2){
    document.getElementById('user-input').style.borderColor = '#f87171';
    return;
  }
  state.name = v; state.step = 'confirm';
  clearOptions();
  await addMessage(v, true);
  await showTyping(800);
  await addMessage(`Massa, <strong>${v.split(' ')[0]}</strong>! 🤙 Confere o resumo:<br><br>
    ${state.service} &nbsp;|&nbsp; ${state.date} &nbsp;|&nbsp; ${state.time}<br><br>
    Confirma o agendamento?`);
  setOptions(`
    <button class="wa-btn" onclick="confirmAppointment()" style="background:#7c3aed;color:#fff;border-color:#7c3aed;">✓ Confirmar</button>
    <button class="wa-btn" onclick="cancelFlow()">✕ Cancelar</button>`);
}

async function confirmAppointment(){
  /* Verificação final antes de salvar */
  if(isTimeBooked(state.date, state.time)){
    clearOptions();
    await addMessage(`😬 Que pena! O horário <strong>${state.time}</strong> foi reservado agora há pouco. Vamos escolher outro?`);
    state.step = 'time';
    const slots = getAvailableTimes(state.date);
    setOptions(slots.map(s => {
      if(s.booked){
        return `<button class="wa-btn" disabled style="opacity:.38;cursor:not-allowed;text-decoration:line-through;">${s.time} ⛔</button>`;
      }
      return `<button class="wa-btn" onclick="selectTime('${s.time}')">${s.time}</button>`;
    }).join(''));
    return;
  }

  clearOptions();
  await addMessage('✓ Confirmar', true);
  await showTyping(1000);

  const colors = ['#7c3aed','#a855f7','#6d28d9','#8b5cf6','#4c1d95'];
  const appt = {
    id: Date.now(),
    name: state.name,
    service: state.service,
    date: state.date,
    time: state.time,
    color: colors[Math.floor(Math.random() * colors.length)],
    isNew: true,
    createdAt: new Date().toISOString()
  };
  const saved = JSON.parse(localStorage.getItem('dz9_appointments') || '[]');
  saved.unshift(appt);
  localStorage.setItem('dz9_appointments', JSON.stringify(saved));

  await addMessage(`🎉 <strong>Agendado com sucesso!</strong><br>Te esperamos <strong>${state.date} às ${state.time}</strong>.<br><em>Barbearia Dz9 te espera! 💈</em>`);
  setTimeout(()=>{ setOptions(`<button class="wa-btn" onclick="restartFlow()">🔄 Novo agendamento</button>`); }, 400);
}

async function cancelFlow(){
  clearOptions();
  await addMessage('✕ Cancelar', true);
  await showTyping(500);
  await addMessage('Tranquilo! Qualquer hora é só chamar. ✂️');
  setTimeout(()=>setOptions(`<button class="wa-btn" onclick="restartFlow()">🔄 Novo agendamento</button>`), 300);
}

async function restartFlow(){
  Object.assign(state,{step:'service',service:null,date:null,time:null,name:null});
  clearOptions();
  await addMessage('Qual <strong>serviço</strong> você quer dessa vez?');
  setOptions(`
    <button class="wa-btn" onclick="selectService('✂️ Corte')">✂️ Corte</button>
    <button class="wa-btn" onclick="selectService('🪒 Barba')">🪒 Barba</button>
    <button class="wa-btn" onclick="selectService('💈 Corte + Barba')">💈 Corte + Barba</button>
    <button class="wa-btn" onclick="selectService('💧 Hidratação')">💧 Hidratação</button>
    <button class="wa-btn" onclick="selectService('🎨 Pigmentação')">🎨 Pigmentação</button>`);
}
</script>
