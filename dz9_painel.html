<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia Dz9 — Painel de Agendamentos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --purple-dark:  #0a0315;
      --purple-bg:    #1a0a2e;
      --purple-mid:   #2d0a4e;
      --purple-top:   #3d0d6e;
      --purple-main:  #7c3aed;
      --purple-light: #a855f7;
      --purple-pale:  #c084fc;
      --purple-text:  #e2c9ff;
      --purple-muted: #9b66cc;
      --purple-dim:   #7c5490;
      --purple-bar:   #12061f;
      --panel-bg:     #0f0518;
      --radius-lg: 16px;
      --radius-md: 8px;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--purple-dark);
      font-family: var(--font);
    }

    /* ── Painel container ── */
    .ag-panel {
      width: calc(100vw - 32px);
      height: calc(100vh - 32px);
      margin: 16px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 0.5px solid var(--purple-top);
      background: var(--panel-bg);
      box-shadow: 0 8px 40px rgba(124,58,237,.25);
    }

    @media (max-width: 600px) {
      .ag-panel {
        width: calc(100vw - 16px);
        height: calc(100vh - 16px);
        margin: 8px;
        border-radius: 12px;
      }
    }

    /* ── Header ── */
    .ag-header {
      background: linear-gradient(135deg, #1a0a2e 0%, #2d0a4e 70%, #3d0d6e 100%);
      padding: 14px 15px 12px;
      flex-shrink: 0;
    }
    .ag-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .ag-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #9b34c8;
      background: #fff;
      flex-shrink: 0;
    }
    .ag-logo img { width: 100%; height: 100%; object-fit: cover; }
    .ag-brand-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: .4px; }
    .ag-brand-sub  { font-size: 11px; color: var(--purple-pale); margin-top: 2px; }
    .ag-date       {
      font-size: 11px; color: var(--purple-muted);
      margin-left: auto; text-align: right; line-height: 1.5;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: rgba(124,58,237,.15);
      border: 0.5px solid #4c1d95;
      border-radius: var(--radius-md);
      padding: 8px;
      text-align: center;
    }
    .stat-num   { font-size: 20px; font-weight: 600; color: var(--purple-pale); }
    .stat-label { font-size: 10px; color: var(--purple-muted); margin-top: 2px; }

    /* ── List ── */
    .ag-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 120px;
    }

    .appt {
      border: 0.5px solid var(--purple-top);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      background: var(--purple-bg);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: all .3s;
    }
    .appt.new-appt {
      animation: slideIn .4s ease;
      border-color: var(--purple-light);
      box-shadow: 0 0 10px rgba(168,85,247,.25);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .appt-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }
    .appt-body  { flex: 1; min-width: 0; }
    .appt-name  { font-size: 13px; font-weight: 500; color: var(--purple-text); }
    .appt-svc   { font-size: 11px; color: var(--purple-muted); margin-top: 2px; }
    .appt-badge {
      font-size: 10px; padding: 2px 8px;
      border-radius: 10px; margin-top: 5px;
      display: inline-block;
    }
    .badge-confirmed { background: rgba(124,58,237,.25); color: var(--purple-pale); border: 0.5px solid var(--purple-main); }
    .badge-new       { background: rgba(168,85,247,.30); color: #e9d5ff;            border: 0.5px solid var(--purple-light); }
    .appt-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .appt-time       { font-size: 11px; color: var(--purple-muted); text-align: right; white-space: nowrap; }
    .appt-time strong{ color: var(--purple-pale); font-weight: 500; display: block; font-size: 13px; }

    .appt-actions { display: flex; gap: 5px; }
    .act-btn {
      border: none;
      border-radius: 6px;
      width: 28px; height: 28px;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .act-btn:hover { opacity: .8; }
    .act-confirm { background: rgba(124,58,237,.35); color: #c084fc; }
    .act-remove  { background: rgba(220,38,38,.25);  color: #f87171; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--purple-dim);
      font-size: 13px;
      line-height: 1.7;
    }

    /* ── Footer ── */
    .ag-footer {
      padding: 7px 12px;
      background: var(--purple-bar);
      border-top: 0.5px solid var(--purple-top);
      text-align: center;
      font-size: 10px;
      color: var(--purple-dim);
      flex-shrink: 0;
    }

    /* ── Scrollbar ── */
    .ag-list::-webkit-scrollbar { width: 4px; }
    .ag-list::-webkit-scrollbar-track { background: transparent; }
    .ag-list::-webkit-scrollbar-thumb { background: var(--purple-top); border-radius: 2px; }
  </style>
</head>

<script>
// ── Dados iniciais de exemplo ───────────────────────────────────────────────
const DEMO = [
  { id:1, name:'Carlos Silva',   service:'✂️ Corte',        date:'Hoje', time:'09:00', color:'#7c3aed', isNew:false },
  { id:2, name:'Rafael Mendes',  service:'💈 Corte + Barba', date:'Hoje', time:'10:30', color:'#a855f7', isNew:false },
  { id:3, name:'Lucas Oliveira', service:'🪒 Barba',          date:'Hoje', time:'11:15', color:'#6d28d9', isNew:false },
];

// Carrega do localStorage (agendamentos reais do bot) + demo
function loadAppointments(){
  const saved = JSON.parse(localStorage.getItem('dz9_appointments') || '[]');
  // Junta demo com os do bot, sem duplicar por id
  const demoFiltered = DEMO.filter(d => !saved.find(s => s.id === d.id));
  return [...saved, ...demoFiltered];
}

function initials(name){ return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

function confirmAppt(id){
  const saved = JSON.parse(localStorage.getItem('dz9_appointments') || '[]');
  const idx = saved.findIndex(a => a.id === id);
  if(idx !== -1){ saved[idx].isNew = false; localStorage.setItem('dz9_appointments', JSON.stringify(saved)); }
  renderAgenda();
}

function removeAppt(id){
  let saved = JSON.parse(localStorage.getItem('dz9_appointments') || '[]');
  saved = saved.filter(a => a.id !== id);
  localStorage.setItem('dz9_appointments', JSON.stringify(saved));
  renderAgenda();
}

function renderAgenda(){
  const appointments = loadAppointments();
  const list = document.getElementById('agenda-list');
  if(!appointments.length){
    list.innerHTML = '<div class="empty-state">Nenhum agendamento ainda.<br>Aguardando clientes! ✂️</div>';
    updateStats(appointments); return;
  }
  list.innerHTML = appointments.map(a => `
    <div class="appt ${a.isNew?'new-appt':''}" id="appt-${a.id}">
      <div class="appt-avatar" style="background:${a.color}33;color:${a.color};">${initials(a.name)}</div>
      <div class="appt-body">
        <div class="appt-name">${a.name}</div>
        <div class="appt-svc">${a.service}</div>
        <span class="appt-badge ${a.isNew?'badge-new':'badge-confirmed'}">${a.isNew?'🆕 Novo':'✓ Confirmado'}</span>
      </div>
      <div class="appt-right">
        <div class="appt-time"><strong>${a.time}</strong>${a.date}</div>
        <div class="appt-actions">
          ${a.isNew ? `<button class="act-btn act-confirm" onclick="confirmAppt(${a.id})">✓</button>` : ''}
          <button class="act-btn act-remove" onclick="removeAppt(${a.id})">✕</button>
        </div>
      </div>
    </div>`).join('');
  updateStats(appointments);
}

function updateStats(appointments){
  document.getElementById('stat-total').textContent     = appointments.length;
  document.getElementById('stat-confirmed').textContent = appointments.filter(a=>!a.isNew).length;
  document.getElementById('stat-pending').textContent   = appointments.filter(a=>a.isNew).length;
}

// Escuta mudanças do bot em outra aba/janela em tempo real
window.addEventListener('storage', e => {
  if(e.key === 'dz9_appointments') renderAgenda();
});

// Data de hoje no cabeçalho
